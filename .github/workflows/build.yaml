name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: bodesg24
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ghcr.io/bodesg24/pet-clinic:latest .

      - name: Push Docker Image
        run: docker push ghcr.io/bodesg24/pet-clinic:latest